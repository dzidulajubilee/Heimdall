<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suricata Dashboard</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg0:#0a0c10; --bg1:#0f1117; --bg2:#161b24; --bg3:#1e2533;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
  --text1:#e8eaf0; --text2:#7b8394; --text3:#4a5163;
  --accent:#4f9cf9; --accent-d:rgba(79,156,249,0.14);
  --red:#f05454;    --red-d:rgba(240,84,84,0.13);
  --orange:#f5944a; --orange-d:rgba(245,148,74,0.13);
  --yellow:#f5c842; --yellow-d:rgba(245,200,66,0.13);
  --green:#4caf82;  --green-d:rgba(76,175,130,0.13);
  --purple:#9f7aea;
  --mono:'IBM Plex Mono',monospace;
  --sans:'IBM Plex Sans',system-ui,sans-serif;
}
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');
html,body,#root { height:100%; }
body { font-family:var(--sans); background:var(--bg0); color:var(--text1); font-size:13px; line-height:1.5; overflow:hidden; }

/* scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:2px}

/* layout */
.shell { display:grid; grid-template-rows:52px 1fr; grid-template-columns:210px 1fr; height:100vh; overflow:hidden; }

/* topbar */
.topbar { grid-column:1/-1; background:var(--bg1); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 18px; gap:14px; }
.logo { display:flex; align-items:center; gap:9px; font-family:var(--mono); font-size:13px; font-weight:500; letter-spacing:.05em; flex-shrink:0; }
.logo-box { width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center; }
.sep { width:1px;height:22px;background:var(--border); }
.pill { display:flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;border:1px solid var(--border);background:var(--bg2);font-family:var(--mono);font-size:11px;color:var(--text2); }
.pill b { color:var(--text1); font-weight:500; }
.right { margin-left:auto;display:flex;align-items:center;gap:10px; }
.clock { font-family:var(--mono);font-size:12px;color:var(--text3);letter-spacing:.04em; }
.badge { display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;letter-spacing:.06em; }
.dot { width:7px;height:7px;border-radius:50%;animation:pulse 1.6s ease-in-out infinite; }
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}

/* sidebar */
.sidebar { background:var(--bg1);border-right:1px solid var(--border);padding:14px 0;overflow-y:auto;display:flex;flex-direction:column;gap:6px; }
.sidebar-label { font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);padding:0 18px;margin:8px 0 4px; }
.nav-item { display:flex;align-items:center;gap:9px;padding:7px 10px;margin:0 8px;border-radius:6px;cursor:pointer;color:var(--text2);font-size:12px;border:1px solid transparent;user-select:none;transition:all .15s; }
.nav-item:hover{background:var(--bg2);color:var(--text1)}
.nav-item.active{background:var(--accent-d);color:var(--accent);border-color:rgba(79,156,249,.2)}
.nav-badge{margin-left:auto;font-family:var(--mono);font-size:10px;padding:1px 6px;border-radius:10px;background:var(--red-d);color:var(--red)}
.divider{height:1px;background:var(--border);margin:6px 12px}
.sev-row{display:flex;align-items:center;gap:8px;padding:5px 10px;margin:0 8px;border-radius:6px;cursor:pointer;font-size:12px;color:var(--text2);user-select:none;transition:background .15s}
.sev-row:hover{background:var(--bg2)}
.sev-row.on{color:var(--text1)}
.sev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sev-cnt{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--text3)}
.src-row{display:flex;align-items:center;justify-content:space-between;padding:4px 10px;margin:0 8px;font-size:11px}
.src-ip{font-family:var(--mono);color:var(--text2)}
.src-cnt{font-family:var(--mono);font-size:10px;color:var(--text3)}

/* metrics */
.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
.metric{background:var(--bg1);padding:13px 16px}
.metric-label{font-size:9px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--text3);margin-bottom:3px}
.metric-val{font-family:var(--mono);font-size:22px;font-weight:500;line-height:1.1}
.metric-sub{font-size:10px;color:var(--text3);margin-top:2px;font-family:var(--mono)}

/* content */
.content{flex:1;display:grid;grid-template-columns:1fr 310px;overflow:hidden}
.main{display:flex;flex-direction:column;overflow:hidden}

/* pane */
.pane-head{display:flex;align-items:center;padding:9px 14px;border-bottom:1px solid var(--border);background:var(--bg1);gap:9px;flex-shrink:0}
.pane-title{font-size:12px;font-weight:500}
.pane-cnt{font-family:var(--mono);font-size:11px;color:var(--text3);background:var(--bg2);padding:1px 7px;border-radius:10px}
.pane-actions{margin-left:auto;display:flex;align-items:center;gap:7px}
.btn{padding:4px 10px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:11px;font-family:var(--sans);cursor:pointer;transition:all .15s}
.btn:hover{background:var(--bg3);color:var(--text1)}
.btn.on{background:var(--accent-d);color:var(--accent);border-color:rgba(79,156,249,.25)}
.search{display:flex;align-items:center;gap:5px;padding:4px 9px;border-radius:5px;border:1px solid var(--border);background:var(--bg2)}
.search:focus-within{border-color:var(--border2)}
.search input{background:transparent;border:none;outline:none;font-size:12px;font-family:var(--sans);color:var(--text1);width:150px}
.search input::placeholder{color:var(--text3)}

/* table */
.tscroll{flex:1;overflow-y:auto}
table{width:100%;border-collapse:collapse}
thead{position:sticky;top:0;z-index:2}
th{padding:7px 11px;text-align:left;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);background:var(--bg1);border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:var(--text2)}
.arow{border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.arow:hover{background:var(--bg1)}
.arow.sel{background:var(--bg2)!important}
.arow.new{animation:rowIn .3s ease-out}
@keyframes rowIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
td{padding:8px 11px;vertical-align:middle;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:0}
td:last-child{max-width:unset}

/* badges */
.sbadge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:500;font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em}
.sbadge.critical{background:var(--red-d);color:var(--red)}
.sbadge.high{background:var(--orange-d);color:var(--orange)}
.sbadge.medium{background:var(--yellow-d);color:var(--yellow)}
.sbadge.low{background:var(--green-d);color:var(--green)}
.sbadge.info{background:var(--accent-d);color:var(--accent)}
.proto{font-family:var(--mono);font-size:10px;padding:1px 5px;border-radius:3px;background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.sig{font-size:12px;color:var(--text1)}
.ip{font-family:var(--mono);font-size:11px;color:var(--text2)}
.ts{font-family:var(--mono);font-size:10px;color:var(--text3)}

/* empty state */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;color:var(--text3);font-size:12px;text-align:center}
.empty svg{width:40px;height:40px;opacity:.25}
.empty .sub{font-size:11px;font-family:var(--mono)}

/* detail */
.detail{display:flex;flex-direction:column;overflow:hidden;background:var(--bg0)}
.dscroll{flex:1;overflow-y:auto;padding:14px}
.dsec{margin-bottom:18px}
.dsec-title{font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:9px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.dfield{background:var(--bg1);border:1px solid var(--border);border-radius:5px;padding:7px 9px}
.dfield-label{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:2px}
.dfield-val{font-family:var(--mono);font-size:11px;color:var(--text1);word-break:break-all}
.dfull{grid-column:1/-1}
.rawjson{background:var(--bg2);border:1px solid var(--border);border-radius:5px;padding:9px 11px;font-family:var(--mono);font-size:10px;color:var(--text2);line-height:1.7;white-space:pre;overflow-x:auto;max-height:200px;overflow-y:auto}

/* sparkline */
.spark-wrap{padding:8px 0 4px;background:var(--bg1);border-top:1px solid var(--border);flex-shrink:0}
.spark-label{padding:0 14px;font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:5px}
.spark-row{display:flex;align-items:flex-end;gap:2px;height:28px;padding:0 14px}
.spark-bar{flex:1;border-radius:2px 2px 0 0;background:var(--accent-d);border-top:1px solid rgba(79,156,249,.25);min-width:3px}

/* timeline */
.tline{padding:8px 12px;display:flex;flex-direction:column;gap:5px;border-top:1px solid var(--border);max-height:140px;overflow-y:auto}
.tl-item{display:flex;align-items:center;gap:7px;font-size:11px}
.tl-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.tl-time{font-family:var(--mono);font-size:10px;color:var(--text3);flex-shrink:0;width:52px}
.tl-msg{color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── constants ──────────────────────────────────────────────────────────────
const SEV_COLORS = {
  critical: 'var(--red)', high: 'var(--orange)',
  medium: 'var(--yellow)', low: 'var(--green)', info: 'var(--accent)'
};
const MAX_ALERTS = 2000;
const SSE_URL = '/events';

// ── helpers ────────────────────────────────────────────────────────────────
function fmtTime(ts) {
  try { return new Date(ts).toLocaleTimeString('en-GB', {hour12:false}); }
  catch { return '--:--:--'; }
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Clock ──────────────────────────────────────────────────────────────────
function Clock() {
  const [t, setT] = useState('');
  useEffect(() => {
    const tick = () => setT(new Date().toLocaleTimeString('en-GB',{hour12:false}));
    tick();
    const id = setInterval(tick, 500);
    return () => clearInterval(id);
  }, []);
  return <span className="clock">{t}</span>;
}

// ── Sparkline ──────────────────────────────────────────────────────────────
function Sparkline({ data }) {
  const max = Math.max(1, ...data);
  return (
    <div className="spark-wrap">
      <div className="spark-label">Alerts / 60s window</div>
      <div className="spark-row">
        {data.map((v, i) => {
          const h = Math.max(2, Math.round((v / max) * 26));
          return <div key={i} className="spark-bar" style={{height: h}} />;
        })}
      </div>
    </div>
  );
}

// ── Detail panel ───────────────────────────────────────────────────────────
function Detail({ alert }) {
  if (!alert) return (
    <div className="dscroll">
      <div className="empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <line x1="3" y1="9" x2="21" y2="9"/>
          <line x1="9" y1="21" x2="9" y2="9"/>
        </svg>
        <div>Waiting for real alerts…</div>
        <div className="sub">Select one to inspect</div>
      </div>
    </div>
  );

  const raw = JSON.stringify(alert.raw || alert, null, 2);
  const coloredRaw = raw
    .replace(/"([^"]+)":/g, (_, k) => `<span style="color:var(--accent)">"${k}"</span>:`)
    .replace(/: "([^"]*)"/g, (_, v) => `: <span style="color:var(--green)">"${v}"</span>`)
    .replace(/: (\d+)/g, (_, v) => `: <span style="color:var(--orange)">${v}</span>`)
    .replace(/: (true|false)/g, (_, v) => `: <span style="color:var(--purple)">${v}</span>`);

  const Field = ({ label, val, full, color }) => (
    <div className={`dfield${full ? ' dfull' : ''}`}>
      <div className="dfield-label">{label}</div>
      <div className="dfield-val" style={color ? {color} : {}}>{val}</div>
    </div>
  );

  return (
    <div className="dscroll">
      <div className="dsec">
        <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:12}}>
          <span className={`sbadge ${alert.severity}`}>{alert.severity}</span>
          <span style={{fontSize:13, fontWeight:500}}>{alert.sig_msg}</span>
        </div>
      </div>
      <div className="dsec">
        <div className="dsec-title">Network</div>
        <div className="dgrid">
          <Field label="Source IP"   val={alert.src_ip} />
          <Field label="Source Port" val={alert.src_port} />
          <Field label="Dest IP"     val={alert.dst_ip} />
          <Field label="Dest Port"   val={alert.dst_port} />
          <Field label="Protocol"    val={alert.proto} />
          <Field label="Action"      val={alert.action}
            color={alert.action === 'blocked' ? 'var(--red)' : 'var(--green)'} />
        </div>
      </div>
      <div className="dsec">
        <div className="dsec-title">Signature</div>
        <div className="dgrid">
          <Field label="SID"      val={alert.sig_id} />
          <Field label="Category" val={alert.category} />
          <Field label="Flow ID"  val={alert.flow_id} full />
          <Field label="Timestamp" val={alert.ts} full />
        </div>
      </div>
      <div className="dsec">
        <div className="dsec-title">Raw EVE JSON</div>
        <pre className="rawjson" dangerouslySetInnerHTML={{__html: coloredRaw}} />
      </div>
    </div>
  );
}

// ── Timeline ───────────────────────────────────────────────────────────────
function Timeline({ alerts }) {
  return (
    <div className="tline">
      {alerts.slice(0, 8).map(a => (
        <div key={a.id} className="tl-item">
          <div className="tl-dot" style={{background: SEV_COLORS[a.severity]}} />
          <div className="tl-time">{fmtTime(a.ts)}</div>
          <div className="tl-msg">{a.sig_msg}</div>
        </div>
      ))}
    </div>
  );
}

// ── Main App ───────────────────────────────────────────────────────────────
function App() {
  const [alerts,    setAlerts]    = useState([]);
  const [selected,  setSelected]  = useState(null);
  const [paused,    setPaused]    = useState(false);
  const [search,    setSearch]    = useState('');
  const [activeSev, setActiveSev] = useState(new Set(['critical','high','medium','low','info']));
  const [connState, setConnState] = useState('connecting'); // connecting | live | reconnecting
  const [historyLoaded, setHistoryLoaded] = useState(false);
  const [historyCount,  setHistoryCount]  = useState(0);
  const [showConfirm,   setShowConfirm]   = useState(false);
  const [clearing,      setClearing]      = useState(false);
  const [sparkData, setSparkData] = useState(new Array(30).fill(0));
  const [rate,      setRate]      = useState(0);

  const pausedRef   = useRef(false);
  const accumRef    = useRef(0);
  const sparkIdxRef = useRef(0);
  const newIdsRef   = useRef(new Set());

  // Load history from SQLite on mount
  useEffect(() => {
    fetch('/alerts?limit=5000')
      .then(r => { if(r.status === 401) { window.location.href='/login'; throw new Error('unauth'); } return r.json(); })
      .then(data => {
        if (!Array.isArray(data)) return;
        const loaded = data.map(a => ({
          ...a,
          tsStr: fmtTime(a.ts),
          _fromHistory: true,
        }));
        setAlerts(loaded);
        setHistoryCount(loaded.length);
        setHistoryLoaded(true);
      })
      .catch(() => setHistoryLoaded(true)); // no history — still mark done
  }, []);

  // SSE connection
  useEffect(() => {
    let es;
    let retryTimer;

    function connect() {
      setConnState('connecting');
      es = new EventSource(SSE_URL);

      es.addEventListener('ping', () => {
        setConnState('live');
      });

      es.addEventListener('alert', e => {
        setConnState('live');
        if (pausedRef.current) return;
        try {
          const evt = JSON.parse(e.data);
          const alert = {
            ...evt,
            id:    evt.id || String(Date.now() + Math.random()),
            tsStr: fmtTime(evt.ts),
          };
          accumRef.current++;
          newIdsRef.current.add(alert.id);
          setTimeout(() => newIdsRef.current.delete(alert.id), 400);
          setAlerts(prev => {
            // skip if already in history
            if (prev.some(x => x.id === alert.id)) return prev;
            return [alert, ...prev].slice(0, MAX_ALERTS);
          });
        } catch {}
      });

      es.onerror = () => {
        es.close();
        setConnState('reconnecting');
        retryTimer = setTimeout(connect, 3000);
      };
    }

    connect();
    return () => { es?.close(); clearTimeout(retryTimer); };
  }, []);

  // Pause ref sync
  useEffect(() => { pausedRef.current = paused; }, [paused]);

  // Sparkline + rate ticker
  useEffect(() => {
    const id = setInterval(() => {
      const count = accumRef.current;
      accumRef.current = 0;
      setRate(count);
      setSparkData(prev => {
        const next = [...prev];
        next[sparkIdxRef.current % 30] = count;
        sparkIdxRef.current++;
        return next;
      });
    }, 1000);
    return () => clearInterval(id);
  }, []);

  // Derived
  const counts = { critical:0, high:0, medium:0, low:0, info:0 };
  alerts.forEach(a => counts[a.severity] = (counts[a.severity]||0) + 1);

  const uniqueSrcs = new Set(alerts.map(a => a.src_ip)).size;

  const topCat = (() => {
    const cc = {};
    alerts.forEach(a => cc[a.category] = (cc[a.category]||0)+1);
    let top = '—', mx = 0;
    for (const [k,v] of Object.entries(cc)) if (v > mx) { mx=v; top=k; }
    return { name: top, count: mx };
  })();

  const topSrcs = (() => {
    const cc = {};
    alerts.forEach(a => cc[a.src_ip] = (cc[a.src_ip]||0)+1);
    return Object.entries(cc).sort((a,b)=>b[1]-a[1]).slice(0,5);
  })();

  const filtered = alerts.filter(a =>
    activeSev.has(a.severity) &&
    (!search || a.sig_msg?.toLowerCase().includes(search.toLowerCase()) ||
     a.src_ip?.includes(search) || a.dst_ip?.includes(search) ||
     String(a.sig_id).includes(search))
  );

  async function handleClear() {
    setClearing(true);
    try {
      await fetch('/alerts', { method: 'DELETE' });
    } catch(e) {}
    setAlerts([]);
    setSelected(null);
    setHistoryCount(0);
    setClearing(false);
    setShowConfirm(false);
  }

  const connColor = {live:'var(--green)', connecting:'var(--yellow)', reconnecting:'var(--text3)'}[connState];
  const connLabel = {live:'LIVE', connecting:'CONNECTING…', reconnecting:'RECONNECTING…'}[connState];

  function toggleSev(s) {
    setActiveSev(prev => {
      const next = new Set(prev);
      if (next.has(s)) { if (next.size > 1) next.delete(s); }
      else next.add(s);
      return next;
    });
  }

  return (
    <div className="shell">
      {/* Topbar */}
      <header className="topbar">
        <div className="logo">
          <div className="logo-box">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M2 8L8 2L14 8L8 14L2 8Z" fill="white" fillOpacity=".9"/>
              <path d="M5 8L8 5L11 8L8 11L5 8Z" fill="white" fillOpacity=".4"/>
            </svg>
          </div>
          SURICATA
        </div>
        <div className="sep"/>
        <div className="badge">
          <div className="dot" style={{background: connColor}}/>
          <span style={{color: connColor, fontFamily:'var(--mono)', fontSize:11, letterSpacing:'.06em'}}>{connLabel}</span>
        </div>
        <div className="sep"/>
        <div className="pill">Interface: <b style={{marginLeft:4}}>eth0</b></div>
        <div className="pill">Engine: <b style={{marginLeft:4, color:'var(--green)'}}>Running</b></div>
        <div className="right">
          <div className="pill">Alerts/s: <b style={{marginLeft:4}}>{rate}</b></div>
          <Clock/>
        <a href="/logout" style={{
          padding:'3px 10px', borderRadius:5,
          border:'1px solid rgba(255,255,255,0.09)',
          color:'var(--text3)', fontSize:11,
          fontFamily:'var(--mono)', textDecoration:'none',
          letterSpacing:'.04em', transition:'all .15s',
        }}
        onMouseOver={e=>{e.currentTarget.style.color='var(--red)';e.currentTarget.style.borderColor='rgba(240,84,84,.3)';}}
        onMouseOut={e=>{e.currentTarget.style.color='var(--text3)';e.currentTarget.style.borderColor='rgba(255,255,255,0.09)';}}
        >SIGN OUT</a>
        </div>
      </header>

      {/* Sidebar */}
      <aside className="sidebar">
        <div className="sidebar-label">Views</div>
        <div className="nav-item active">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5">
            <path d="M8 2L14 13H2L8 2Z"/><line x1="8" y1="7" x2="8" y2="10"/>
            <circle cx="8" cy="12" r=".5" fill="currentColor"/>
          </svg>
          Alerts
          <span className="nav-badge">{alerts.length > 999 ? '999+' : alerts.length}</span>
        </div>
        {['Flow Events','DNS Queries','HTTP Events'].map(v => (
          <div key={v} className="nav-item" style={{color:'var(--text3)'}}>
            <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5">
              <path d="M2 4h12M2 8h8M2 12h5"/>
            </svg>
            {v}
          </div>
        ))}

        <div className="divider"/>
        <div className="sidebar-label">Severity</div>
        {['critical','high','medium','low','info'].map(s => (
          <div key={s} className={`sev-row${activeSev.has(s) ? ' on' : ''}`} onClick={() => toggleSev(s)}>
            <div className="sev-dot" style={{background: SEV_COLORS[s]}}/>
            {s.charAt(0).toUpperCase() + s.slice(1)}
            <span className="sev-cnt">{counts[s]}</span>
          </div>
        ))}

        <div className="divider"/>
        <div className="sidebar-label">Top Sources</div>
        {topSrcs.map(([ip, cnt]) => (
          <div key={ip} className="src-row">
            <span className="src-ip">{ip}</span>
            <span className="src-cnt">{cnt}</span>
          </div>
        ))}
        {topSrcs.length === 0 && (
          <div style={{padding:'4px 18px', fontSize:11, color:'var(--text3)', fontFamily:'var(--mono)'}}>
            no data yet
          </div>
        )}
      </aside>

      {/* Main */}
      <main className="main">
        {/* Metrics */}
        <div className="metrics">
          {[
            { label:'Total Alerts',    val: alerts.length, cls: '' },
            { label:'Critical',        val: counts.critical, cls: 'red' },
            { label:'High',            val: counts.high,     cls: 'orange' },
            { label:'Unique Sources',  val: uniqueSrcs,      cls: '' },
          ].map(m => (
            <div key={m.label} className="metric">
              <div className="metric-label">{m.label}</div>
              <div className="metric-val" style={m.cls ? {color:`var(--${m.cls})`} : {}}>{m.val}</div>
            </div>
          ))}
          <div className="metric">
            <div className="metric-label">Top Category</div>
            <div className="metric-val" style={{fontSize:14, paddingTop:4}}>{topCat.name}</div>
            <div className="metric-sub">{topCat.count ? `${topCat.count} alerts` : 'waiting…'}</div>
          </div>
        </div>

        {/* Content */}
        <div className="content">
          {/* Alert table */}
          <div style={{display:'flex', flexDirection:'column', overflow:'hidden', borderRight:'1px solid var(--border)'}}>
            <div className="pane-head">
              <span className="pane-title">Alert Stream</span>
              <span className="pane-cnt">{filtered.length} alerts</span>
              {historyCount > 0 && (
                <span style={{fontSize:10, fontFamily:'var(--mono)', color:'var(--text3)',
                  background:'var(--bg2)', border:'1px solid var(--border)',
                  padding:'1px 7px', borderRadius:10}}>
                  {historyCount} stored
                </span>
              )}
              <div className="pane-actions">
                <div className="search">
                  <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5">
                    <circle cx="7" cy="7" r="4"/><path d="M10 10l3 3"/>
                  </svg>
                  <input
                    placeholder="Search alerts…"
                    value={search}
                    onChange={e => setSearch(e.target.value)}
                  />
                </div>
                <button className={`btn${paused ? '' : ' on'}`} onClick={() => setPaused(p => !p)}>
                  {paused ? 'Resume' : 'Pause'}
                </button>
                <button className="btn" onClick={() => setShowConfirm(true)}>
                  Clear
                </button>
              </div>
            </div>

            <div className="tscroll">
              {filtered.length === 0 ? (
                <div className="empty" style={{height: 300}}>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1">
                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                    <line x1="3" y1="9" x2="21" y2="9"/>
                    <line x1="9" y1="21" x2="9" y2="9"/>
                  </svg>
                  <div>
                    {!historyLoaded
                      ? 'Loading stored alerts…'
                      : connState === 'live'
                      ? 'No alerts match current filters'
                      : connState === 'connecting'
                      ? 'Connecting to Suricata backend…'
                      : 'Disconnected — retrying…'}
                  </div>
                </div>
              ) : (
                <table>
                  <thead>
                    <tr>
                      <th style={{width:85}}>Time</th>
                      <th style={{width:80}}>Severity</th>
                      <th style={{width:52}}>Proto</th>
                      <th>Signature</th>
                      <th style={{width:115}}>Source</th>
                      <th style={{width:115}}>Destination</th>
                      <th style={{width:52}}>SID</th>
                    </tr>
                  </thead>
                  <tbody>
                    {filtered.slice(0, 300).map(a => (
                      <tr
                        key={a.id}
                        className={`arow${selected?.id === a.id ? ' sel' : ''}${newIdsRef.current.has(a.id) ? ' new' : ''}`}
                        onClick={() => setSelected(a)}
                      >
                        <td className="ts">{a.tsStr || fmtTime(a.ts)}</td>
                        <td><span className={`sbadge ${a.severity}`}>{a.severity}</span></td>
                        <td><span className="proto">{a.proto}</span></td>
                        <td className="sig">{a.sig_msg}</td>
                        <td className="ip">{a.src_ip}:{a.src_port}</td>
                        <td className="ip">{a.dst_ip}:{a.dst_port}</td>
                        <td className="ts">{a.sig_id}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}
            </div>
          </div>

          {/* Detail */}
          <div className="detail">
            <div className="pane-head">
              <span className="pane-title">Event Detail</span>
            </div>
            <Detail alert={selected} />
            <Sparkline data={sparkData} />
            <Timeline alerts={alerts} />
          </div>
        </div>
      </main>
    {/* Confirm clear dialog */}
    {showConfirm && (
      <div style={{
        position:'fixed', inset:0, background:'rgba(0,0,0,0.6)',
        display:'flex', alignItems:'center', justifyContent:'center', zIndex:1000
      }}>
        <div style={{
          background:'var(--bg1)', border:'1px solid var(--border2)',
          borderRadius:10, padding:'28px 32px', width:380, maxWidth:'90vw',
        }}>
          <div style={{fontSize:15, fontWeight:500, marginBottom:10}}>Clear all alerts?</div>
          <div style={{fontSize:12, color:'var(--text2)', lineHeight:1.7, marginBottom:24}}>
            This will permanently delete <b style={{color:'var(--text1)'}}>{historyCount > 0 ? historyCount : alerts.length} stored alerts</b> from
            the database. Live alerts will also be cleared from this view.<br/><br/>
            <span style={{color:'var(--red)', fontSize:11}}>This action cannot be undone.</span>
          </div>
          <div style={{display:'flex', gap:10, justifyContent:'flex-end'}}>
            <button className="btn" onClick={() => setShowConfirm(false)} disabled={clearing}
              style={{minWidth:80}}>
              Cancel
            </button>
            <button
              onClick={handleClear}
              disabled={clearing}
              style={{
                minWidth:80, padding:'4px 14px', borderRadius:5,
                border:'1px solid var(--red)', background: clearing ? 'var(--red-d)' : 'var(--red-d)',
                color:'var(--red)', fontSize:11, fontFamily:'var(--sans)', cursor: clearing ? 'wait' : 'pointer',
                transition:'all .15s'
              }}>
              {clearing ? 'Clearing…' : 'Yes, delete all'}
            </button>
          </div>
        </div>
      </div>
    )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
